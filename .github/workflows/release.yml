name: Release

# Builds and publishes the Conductor desktop app for macOS, Windows and
# Linux whenever a GitHub Release is published. Each runner compiles the
# core sidecar natively for its own OS (no cross-compilation), packages it
# with Electron, and uploads the installers + auto-update metadata to that
# same release.
#
# Note: this intentionally does NOT also trigger on tag push. Publishing a
# release through the GitHub UI on a new tag fires both a tag-push event
# and a release-published event, so listening to both would run this
# workflow twice for the same release.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing release tag to build & publish (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # electron-builder reads the version to publish from
      # packages/desktop/package.json, NOT from the git tag that triggered
      # this workflow. If that file's version is stale (e.g. still 0.1.0
      # while the release tag is v0.1.1), electron-builder silently
      # packages/publishes under the stale version instead of the tag that
      # was actually released, leaving the intended release with no
      # assets. Force both package.json files to match the triggering tag
      # so the two can never drift apart.
      - name: Sync package.json version with release tag
        run: |
          TAG="${{ github.event.inputs.tag || github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          echo "Setting package version to $VERSION (from tag $TAG)"
          npm pkg set version="$VERSION"
          npm pkg set version="$VERSION" --prefix packages/desktop

      - name: Build UI
        run: bun run --cwd packages/ui build

      - name: Compile core sidecar binary
        run: bun run --cwd packages/core build:sidecar

      - name: Bundle Electron main process
        run: bun run --cwd packages/desktop build:main

      - name: Package & publish (electron-builder)
        run: bunx electron-builder --publish always
        working-directory: packages/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
