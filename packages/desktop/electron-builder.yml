appId: dev.conductor.desktop
productName: Conductor
executableName: conductor
copyright: Copyright © Conductor contributors

# electron-builder's default artifact filename falls back to package.json's
# "name" for some targets (e.g. .deb), which is the scoped npm name
# "@conductor/desktop" - the literal "@" segment then gets treated as a
# subdirectory that doesn't exist, failing the build. Pin every target's
# output name to productName instead.
artifactName: "${productName}-${version}-${arch}.${ext}"

directories:
  output: out
  buildResources: build

files:
  - dist/main.js
  - package.json

# The compiled core sidecar binary and the built UI bundle are produced by
# separate build steps (packages/core's `build:sidecar`, packages/ui's
# `build`) and copied in here rather than bundled by esbuild, since one is
# a native executable and the other is a folder of static assets.
extraResources:
  - from: ../core/dist-bin
    to: sidecar
  - from: ../ui/dist
    to: ui-dist

mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  icon: build/icon.png

win:
  target:
    - nsis
  icon: build/icon.png

linux:
  target:
    - AppImage
  category: Development
  icon: build/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true

# electron-updater reads this to know where to look for update manifests -
# matches the repo releases are published to.
#
# Releases must always be tagged "vX.Y.Z" (vPrefixedTagName defaults to
# true) so electron-builder's computed tag always matches the tag that
# triggered the release workflow - the workflow's "Sync package.json
# version with release tag" step keeps package.json's version equal to
# the tag with the "v" stripped, so the two never drift apart.
#
# The release workflow runs after *you* publish a GitHub Release, so
# electron-builder must attach its artifacts to that already-published
# release rather than defaulting to creating a brand new draft release
# (its default behavior).
publish:
  provider: github
  owner: PhantomDave
  repo: conductor
  releaseType: release
